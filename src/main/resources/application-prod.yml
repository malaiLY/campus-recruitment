spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
      password: ${REDIS_PASSWORD:}
      timeout: 5000ms

  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}
    virtual-host: ${RABBITMQ_VHOST:/}
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 10

  elasticsearch:
    uris: ${ELASTICSEARCH_URIS}

app:
  minio:
    endpoint: ${MINIO_ENDPOINT}
    access-key: ${MINIO_ACCESS_KEY}
    secret-key: ${MINIO_SECRET_KEY}
    bucket-resume: resume
    bucket-license: license
    bucket-avatar: avatar
    bucket-job-attachment: job-attachment

  jwt:
    secret: ${JWT_SECRET}
    ttl-hours: ${JWT_TTL_HOURS:24}

  security:
    exclude-paths: /auth/register,/auth/login,/jobs,/jobs/**,/swagger-ui/**,/v3/api-docs/**,/swagger-resources/**,/webjars/**
    cors-allowed-origins: ${CORS_ALLOWED_ORIGINS}

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

logging:
  level:
    com.campus.recruitment: info
    com.baomidou.mybatisplus: warn
