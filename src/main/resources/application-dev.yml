spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/campus_recruitment?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD:root}

  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
          max-wait: 2000ms

  rabbitmq:
    host: localhost
    port: 5672
    username: campus
    password: ${RABBITMQ_PASSWORD:campus123}
    virtual-host: /
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 10
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 2000ms

  elasticsearch:
    uris: http://localhost:9200

app:
  minio:
    endpoint: http://localhost:9000
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket-resume: resume
    bucket-license: license
    bucket-avatar: avatar
    bucket-job-attachment: job-attachment

  jwt:
    secret: ${JWT_SECRET:CampusRecruitment2026SecretKeyForJWTTokenGenerationMustBeLongEnough}
    ttl-hours: 24

  security:
    exclude-paths: /auth/register,/auth/login,/jobs,/jobs/**,/swagger-ui/**,/v3/api-docs/**,/swagger-resources/**,/webjars/**
    cors-allowed-origins: http://localhost:3000,http://localhost:5173

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    com.campus.recruitment: debug
    com.baomidou.mybatisplus: debug
