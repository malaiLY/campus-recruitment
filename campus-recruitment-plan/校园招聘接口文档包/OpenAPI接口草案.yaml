components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    UserType:
      type: string
      enum:
      - STUDENT
      - COMPANY
      - ADMIN
    UserStatus:
      type: string
      enum:
      - NORMAL
      - DISABLED
      - PENDING
    CompanyAuditStatus:
      type: string
      enum:
      - UNVERIFIED
      - PENDING
      - APPROVED
      - REJECTED
    JobStatus:
      type: string
      enum:
      - DRAFT
      - PENDING_REVIEW
      - PUBLISHED
      - REJECTED
      - OFFLINE
      - EXPIRED
    ApplicationStatus:
      type: string
      enum:
      - DELIVERED
      - VIEWED
      - INTERVIEW_INVITED
      - BOOKED
      - REJECTED
      - CANCELED
      - FINISHED
    InterviewSlotStatus:
      type: string
      enum:
      - OPEN
      - FULL
      - CLOSED
      - EXPIRED
    InterviewBookingStatus:
      type: string
      enum:
      - BOOKED
      - CANCELED
      - FINISHED
    MessageReadStatus:
      type: string
      enum:
      - UNREAD
      - READ
      - DELETED
    FileBizType:
      type: string
      enum:
      - RESUME
      - AVATAR
      - LICENSE
      - JOB_ATTACHMENT
    ApiResponseVoid:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: success
        data:
          nullable: true
    ErrorResponse:
      type: object
      properties:
        code:
          type: integer
          example: 30002
        message:
          type: string
          example: 重复投递
        data:
          nullable: true
    PageMeta:
      type: object
      properties:
        total:
          type: integer
          format: int64
          example: 100
        pageNum:
          type: integer
          example: 1
        pageSize:
          type: integer
          example: 10
    RegisterRequest:
      type: object
      required:
      - username
      - password
      - confirmPassword
      - userType
      properties:
        username:
          type: string
          example: zhangsan
        password:
          type: string
          format: password
          example: '123456'
        confirmPassword:
          type: string
          format: password
          example: '123456'
        userType:
          $ref: '#/components/schemas/UserType'
        phone:
          type: string
          example: '13800000000'
        email:
          type: string
          format: email
          example: test@example.com
    RegisterResponse:
      type: object
      properties:
        userId:
          type: integer
          format: int64
          example: 10001
        username:
          type: string
          example: zhangsan
        userType:
          $ref: '#/components/schemas/UserType'
    LoginRequest:
      type: object
      required:
      - username
      - password
      - userType
      properties:
        username:
          type: string
          example: zhangsan
        password:
          type: string
          format: password
          example: '123456'
        userType:
          $ref: '#/components/schemas/UserType'
    LoginResponse:
      type: object
      properties:
        token:
          type: string
          example: mock-jwt-token
        expireTime:
          type: integer
          format: int64
          example: 1770000000000
        userId:
